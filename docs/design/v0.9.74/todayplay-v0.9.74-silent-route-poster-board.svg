<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320">
  <defs>
    <style>
      .bg { fill: #FBF8F2; }
      .paper { fill: #F3E9D8; stroke: #E6D1C2; stroke-width: 2; }
      .ink { fill: #2F2522; font-family: Georgia, 'Times New Roman', serif; }
      .sans { fill: #2F2522; font-family: Arial, sans-serif; }
      .muted { fill: #8D827B; font-family: Arial, sans-serif; }
      .red { fill: #B76267; }
      .deep { fill: #3B1B1F; }
      .green { fill: #6B7A66; }
      .blue { fill: #8B98A5; }
      .gold { fill: #D9A37B; }
      .line { stroke: #B76267; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .softline { stroke: #E2CDBE; stroke-width: 2; fill: none; }
      .phone { fill: #181515; }
      .screen { fill: #FBF8F2; }
      .caption { fill: #B76267; font-family: Arial, sans-serif; font-size: 13px; letter-spacing: 5px; font-weight: 700; }
      .small { font-size: 16px; }
      .body { font-size: 20px; }
      .title { font-size: 42px; font-weight: 700; }
      .h1 { font-size: 54px; font-weight: 700; }
      .chip { fill: #FBF8F2; stroke: #E6D1C2; stroke-width: 2; }
      .chipOn { fill: #3B1B1F; }
      .shadow { filter: drop-shadow(0 18px 28px rgba(47, 37, 34, 0.12)); }
    </style>
    <linearGradient id="sunsetDate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4B6A5"/>
      <stop offset="0.55" stop-color="#C98283"/>
      <stop offset="1" stop-color="#3B1B1F"/>
    </linearGradient>
    <linearGradient id="friendNight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0B985"/>
      <stop offset="0.45" stop-color="#7C7A63"/>
      <stop offset="1" stop-color="#2F2522"/>
    </linearGradient>
    <linearGradient id="soloBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D8B8C8"/>
      <stop offset="0.52" stop-color="#8B98A5"/>
      <stop offset="1" stop-color="#3F5366"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1900" height="1320"/>
  <circle cx="1700" cy="120" r="230" fill="#F3E9D8" opacity="0.38"/>
  <circle cx="120" cy="1180" r="260" fill="#E7D7C9" opacity="0.32"/>

  <text x="76" y="78" class="caption">TODAYPLAY V0.9.74 DESIGN BOARD</text>
  <text x="76" y="145" class="ink h1">Silent Route Poster / 静默路线海报</text>
  <text x="78" y="190" class="muted body">点一张，今天就走。卡片像封面，转场像剪成路线，结果页第一眼知道现在去哪一站。</text>

  <g transform="translate(78 245)">
    <rect width="170" height="58" rx="12" class="chip"/>
    <text x="48" y="37" class="sans body" font-weight="700">纸白</text>
    <rect x="198" width="170" height="58" rx="12" fill="#3B1B1F"/>
    <text x="245" y="37" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="20" font-weight="700">深红</text>
    <rect x="396" width="170" height="58" rx="12" fill="#B76267"/>
    <text x="443" y="37" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="20" font-weight="700">暗樱</text>
    <rect x="594" width="170" height="58" rx="12" fill="#6B7A66"/>
    <text x="641" y="37" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="20" font-weight="700">雾绿</text>
    <rect x="792" width="170" height="58" rx="12" fill="#8B98A5"/>
    <text x="839" y="37" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="20" font-weight="700">雾蓝</text>
    <rect x="990" width="170" height="58" rx="12" fill="#D9A37B"/>
    <text x="1037" y="37" fill="#3B1B1F" font-family="Arial, sans-serif" font-size="20" font-weight="700">柔金</text>
    <text x="1260" y="37" class="muted body">纸白暖底 72%，图片 18%，暗樱不超过 7%。</text>
  </g>

  <!-- Phone 1: Home -->
  <g transform="translate(76 390)">
    <text x="0" y="-28" class="caption">01 HOME</text>
    <rect class="phone shadow" x="0" y="0" width="330" height="690" rx="54"/>
    <rect class="screen" x="22" y="22" width="286" height="646" rx="38"/>
    <text x="45" y="75" class="sans body" font-weight="700">TodayPlay · 上海</text>
    <text x="248" y="75" class="muted small">设置</text>
    <g transform="translate(45 104)">
      <rect width="58" height="34" rx="17" class="chipOn"/>
      <text x="14" y="23" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="15" font-weight="700">推荐</text>
      <rect x="70" width="58" height="34" rx="17" class="chip"/>
      <text x="84" y="23" class="muted small">约会</text>
      <rect x="140" width="58" height="34" rx="17" class="chip"/>
      <text x="154" y="23" class="muted small">朋友</text>
      <rect x="210" width="58" height="34" rx="17" class="chip"/>
      <text x="224" y="23" class="muted small">独处</text>
    </g>
    <g transform="translate(45 158)">
      <rect width="240" height="360" rx="24" class="paper"/>
      <rect x="18" y="18" width="204" height="176" rx="18" fill="url(#sunsetDate)"/>
      <path d="M42 158 C84 118, 118 122, 166 90 S196 82, 210 108" stroke="#FBF8F2" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="42" cy="158" r="8" class="red"/>
      <circle cx="166" cy="90" r="7" fill="#FBF8F2"/>
      <text x="28" y="226" class="ink title" font-size="25">黄昏散步</text>
      <text x="28" y="258" class="muted small">上海 · 90 分</text>
      <g transform="translate(28 282)">
        <rect width="88" height="28" rx="14" fill="#FBF8F2" stroke="#E6D1C2"/>
        <circle cx="16" cy="14" r="11" class="red"/>
        <text x="12" y="19" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="13" font-weight="700">1</text>
        <text x="34" y="19" class="sans small">武康路</text>
        <rect x="98" width="96" height="28" rx="14" fill="#FBF8F2" stroke="#E6D1C2"/>
        <circle cx="114" cy="14" r="11" fill="#D9AFA1"/>
        <text x="110" y="19" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="13" font-weight="700">2</text>
        <text x="132" y="19" class="sans small">外滩线</text>
      </g>
      <rect x="28" y="322" width="72" height="30" rx="15" fill="#FBF8F2" stroke="#E6D1C2"/>
      <text x="46" y="342" class="red small" font-weight="700">好开口</text>
      <rect x="132" y="314" width="90" height="38" rx="19" class="red"/>
      <text x="160" y="339" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="17" font-weight="700">开始</text>
    </g>
    <g transform="translate(45 540)">
      <rect width="112" height="92" rx="20" class="paper"/>
      <rect x="16" y="16" width="80" height="36" rx="12" fill="url(#soloBlue)"/>
      <text x="16" y="76" class="sans small" font-weight="700">独处慢走</text>
      <rect x="130" width="112" height="92" rx="20" class="paper"/>
      <rect x="146" y="16" width="80" height="36" rx="12" fill="url(#friendNight)"/>
      <text x="146" y="76" class="sans small" font-weight="700">朋友小局</text>
    </g>
  </g>

  <!-- Phone 2: Prompt -->
  <g transform="translate(480 390)">
    <text x="0" y="-28" class="caption">02 ONE LINE</text>
    <rect class="phone shadow" x="0" y="0" width="330" height="690" rx="54"/>
    <rect class="screen" x="22" y="22" width="286" height="646" rx="38"/>
    <rect x="42" y="64" width="246" height="110" rx="24" fill="#F3E9D8" opacity="0.42"/>
    <rect x="42" y="195" width="246" height="110" rx="24" fill="#F3E9D8" opacity="0.28"/>
    <rect x="42" y="330" width="246" height="190" rx="28" class="paper"/>
    <text x="68" y="380" class="ink title" font-size="25">今晚怎么走？</text>
    <text x="68" y="420" class="muted body">两个人，100 内，少走路。</text>
    <g transform="translate(68 454)">
      <rect width="72" height="32" rx="16" class="chip"/>
      <text x="14" y="22" class="muted small">少走路</text>
      <rect x="82" width="72" height="32" rx="16" class="chip"/>
      <text x="96" y="22" class="muted small">低预算</text>
      <rect x="164" width="72" height="32" rx="16" class="chip"/>
      <text x="178" y="22" class="muted small">更安静</text>
    </g>
    <rect x="68" y="504" width="86" height="38" rx="19" class="deep"/>
    <text x="96" y="529" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="16" font-weight="700">发送</text>
    <text x="68" y="585" class="muted small">发送后显影 3 张候选。</text>
  </g>

  <!-- Phone 3: Candidates and transition -->
  <g transform="translate(884 390)">
    <text x="0" y="-28" class="caption">03 CANDIDATES</text>
    <rect class="phone shadow" x="0" y="0" width="330" height="690" rx="54"/>
    <rect class="screen" x="22" y="22" width="286" height="646" rx="38"/>
    <text x="52" y="78" class="ink title" font-size="30">听懂今天</text>
    <rect x="52" y="108" width="226" height="58" rx="20" class="paper"/>
    <text x="76" y="144" class="muted body">上海 / 约会 / 少走路</text>
    <text x="52" y="210" class="sans body" font-weight="700">筛同城点</text>
    <path d="M74 300 C128 244, 184 262, 244 226" class="line"/>
    <circle cx="74" cy="300" r="11" class="red"/>
    <circle cx="154" cy="262" r="11" class="green"/>
    <circle cx="244" cy="226" r="11" class="gold"/>
    <text x="52" y="380" class="sans body" font-weight="700">3 张候选</text>
    <g transform="translate(52 410)">
      <rect width="226" height="72" rx="18" class="paper"/>
      <text x="22" y="45" class="ink title" font-size="23">黄昏散步</text>
      <rect x="172" y="22" width="34" height="28" rx="14" class="red"/>
      <text x="183" y="42" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="14">选</text>
      <rect y="88" width="226" height="72" rx="18" class="paper"/>
      <text x="22" y="133" class="ink title" font-size="24">雨天室内</text>
      <rect y="176" width="226" height="72" rx="18" class="paper"/>
      <text x="22" y="221" class="ink title" font-size="24">安静慢走</text>
    </g>
  </g>

  <!-- Phone 4: Result -->
  <g transform="translate(1288 390)">
    <text x="0" y="-28" class="caption">04 MAP FIRST</text>
    <rect class="phone shadow" x="0" y="0" width="330" height="690" rx="54"/>
    <rect class="screen" x="22" y="22" width="286" height="646" rx="38"/>
    <text x="55" y="74" class="ink title" font-size="32">黄昏散步</text>
    <text x="55" y="112" class="muted small">上海 · 90 分</text>
    <rect x="55" y="148" width="220" height="220" rx="24" class="paper"/>
    <path d="M84 292 C120 238, 176 260, 242 198" class="line"/>
    <path d="M84 292 C120 238, 176 260, 242 198" stroke="#E2CDBE" stroke-width="16" fill="none" opacity="0.35"/>
    <circle cx="84" cy="292" r="13" class="red"/>
    <circle cx="176" cy="260" r="11" class="green"/>
    <circle cx="242" cy="198" r="12" class="gold"/>
    <rect x="76" y="170" width="72" height="30" rx="15" fill="#FBF8F2" stroke="#E6D1C2"/>
    <text x="99" y="190" class="sans small">上海</text>
    <rect x="55" y="392" width="220" height="146" rx="24" class="paper"/>
    <text x="78" y="430" class="red body" font-weight="700">当前站</text>
    <text x="78" y="466" class="ink title" font-size="23">武康路</text>
    <text x="78" y="500" class="muted small">静安 / 19:00</text>
    <rect x="78" y="518" width="92" height="40" rx="20" class="red"/>
    <text x="96" y="544" fill="#FBF8F2" font-family="Arial, sans-serif" font-size="17" font-weight="700">打开地图</text>
    <rect x="182" y="518" width="72" height="40" rx="20" class="chip"/>
    <text x="200" y="544" class="muted small" font-weight="700">完成</text>
    <g transform="translate(55 565)">
      <rect width="92" height="34" rx="17" class="chip"/>
      <text x="22" y="23" class="muted small">换近点</text>
      <rect x="104" width="82" height="34" rx="17" class="chip"/>
      <text x="126" y="23" class="muted small">少走路</text>
    </g>
  </g>

  <!-- Responsive row -->
  <g transform="translate(78 1132)">
    <text x="0" y="-34" class="caption">QA REDLINES / DESIGN MUST PASS</text>
    <rect width="388" height="84" rx="18" class="paper"/>
    <text x="28" y="35" class="sans body" font-weight="700">小屏 320x640</text>
    <text x="28" y="64" class="muted small">首卡按钮完整，露出第二张卡。</text>
    <rect x="430" width="388" height="84" rx="18" class="paper"/>
    <text x="458" y="35" class="sans body" font-weight="700">横屏首页</text>
    <text x="458" y="64" class="muted small">卡最大宽 360dp，不截 CTA。</text>
    <rect x="860" width="388" height="84" rx="18" class="paper"/>
    <text x="888" y="35" class="sans body" font-weight="700">结果页</text>
    <text x="888" y="64" class="muted small">地图、当前站、打开地图、完成同屏。</text>
    <rect x="1290" width="388" height="84" rx="18" class="paper"/>
    <text x="1318" y="35" class="sans body" font-weight="700">动效</text>
    <text x="1318" y="64" class="muted small">不转圈，2200ms 内 fallback。</text>
  </g>
</svg>
