<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf8f2"/>
      <stop offset="1" stop-color="#f2eadc"/>
    </linearGradient>
    <linearGradient id="dusk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9a7a7"/>
      <stop offset="0.55" stop-color="#b76267"/>
      <stop offset="1" stop-color="#3b1b1f"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef1ea"/>
      <stop offset="1" stop-color="#6b7a66"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3b1b1f" flood-opacity="0.10"/>
    </filter>
    <style>
      .tiny{font: 12px sans-serif;letter-spacing:4px;fill:#9a8d84}
      .kicker{font: 13px sans-serif;letter-spacing:5px;fill:#b76267;font-weight:700}
      .h1{font: 44px serif;fill:#2f2522;font-weight:700}
      .h2{font: 28px serif;fill:#2f2522;font-weight:700}
      .body{font: 17px sans-serif;fill:#8a817a}
      .label{font: 14px sans-serif;fill:#8a817a}
      .strong{font: 18px sans-serif;fill:#2f2522;font-weight:700}
      .phone{fill:#1f1b1a}
      .screen{fill:url(#paper)}
      .card{fill:#fffaf2;stroke:#eadbcc;stroke-width:2}
      .chip{fill:#fffaf2;stroke:#eadbcc;stroke-width:2}
      .primary{fill:#b76267}
      .ink{fill:#2f2522}
      .muted{fill:#8a817a}
      .line{stroke:#b76267;stroke-width:4;fill:none;stroke-linecap:round}
      .route{stroke:#fffaf2;stroke-width:4;fill:none;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1800" height="1120" fill="url(#paper)"/>
  <circle cx="1530" cy="120" r="210" fill="#d9a7a7" opacity="0.08"/>
  <circle cx="220" cy="980" r="180" fill="#6b7a66" opacity="0.08"/>

  <text x="70" y="70" class="tiny">TODAYPLAY V0.9.73 DESIGN BOARD</text>
  <text x="70" y="132" class="h1">少字、轻转场、静默瀑布流</text>
  <text x="70" y="172" class="body">先用可玩的路线卡让用户想点，再用一句话入口生成自己的同城路线。</text>

  <rect x="70" y="214" width="160" height="54" rx="12" fill="#fffaf2" stroke="#eadbcc" stroke-width="2"/>
  <text x="115" y="248" class="strong">纸白</text>
  <rect x="250" y="214" width="160" height="54" rx="12" fill="#3b1b1f"/>
  <text x="296" y="248" fill="#fffaf2" font-size="18" font-family="sans-serif" font-weight="700">墨黑</text>
  <rect x="430" y="214" width="160" height="54" rx="12" fill="#b76267"/>
  <text x="476" y="248" fill="#fffaf2" font-size="18" font-family="sans-serif" font-weight="700">暗红</text>
  <rect x="610" y="214" width="160" height="54" rx="12" fill="#6b7a66"/>
  <text x="656" y="248" fill="#fffaf2" font-size="18" font-family="sans-serif" font-weight="700">雾绿</text>
  <rect x="790" y="214" width="160" height="54" rx="12" fill="#8b98a5"/>
  <text x="836" y="248" fill="#fffaf2" font-size="18" font-family="sans-serif" font-weight="700">雾蓝</text>
  <text x="1000" y="248" class="body">主色不超过 8%，卡片靠留白和主图吸引点击。</text>

  <!-- Phone 1 -->
  <text x="70" y="340" class="kicker">01 HOME / QUIET WATERFALL</text>
  <rect x="70" y="365" width="310" height="610" rx="48" class="phone" filter="url(#shadow)"/>
  <rect x="88" y="383" width="274" height="574" rx="34" class="screen"/>
  <text x="112" y="430" class="strong">TodayPlay · 上海</text>
  <text x="286" y="430" class="label">设置</text>
  <g>
    <rect x="112" y="455" width="56" height="32" rx="16" fill="#3b1b1f"/>
    <text x="126" y="476" fill="#fffaf2" font-size="13" font-family="sans-serif">推荐</text>
    <rect x="176" y="455" width="56" height="32" rx="16" class="chip"/>
    <text x="190" y="476" class="label">约会</text>
    <rect x="240" y="455" width="56" height="32" rx="16" class="chip"/>
    <text x="254" y="476" class="label">朋友</text>
  </g>
  <rect x="112" y="508" width="108" height="206" rx="14" class="card"/>
  <rect x="124" y="520" width="84" height="72" rx="10" fill="url(#dusk)"/>
  <path d="M132 573 C150 548 175 560 202 538" class="route"/>
  <text x="124" y="620" class="strong">黄昏散步</text>
  <text x="124" y="646" class="label">上海 · 90m</text>
  <text x="124" y="672" class="label">武康路 / 外滩</text>
  <rect x="124" y="684" width="72" height="24" rx="12" class="primary"/>
  <text x="147" y="701" fill="#fffaf2" font-size="12" font-family="sans-serif">开始</text>
  <rect x="238" y="508" width="108" height="154" rx="14" class="card"/>
  <rect x="250" y="520" width="84" height="54" rx="10" fill="url(#mist)"/>
  <path d="M258 557 L282 540 L326 562" class="route"/>
  <text x="250" y="602" class="strong">雨天室内</text>
  <text x="250" y="628" class="label">上海 · 2h</text>
  <rect x="238" y="680" width="108" height="180" rx="14" class="card"/>
  <rect x="250" y="692" width="84" height="58" rx="10" fill="#eadbcc"/>
  <path d="M260 724 L292 724 L326 710" class="line"/>
  <text x="250" y="778" class="strong">低预算聊</text>
  <text x="250" y="804" class="label">广州 · 2h</text>
  <rect x="112" y="740" width="108" height="142" rx="14" class="card"/>
  <rect x="124" y="752" width="84" height="50" rx="10" fill="#8b98a5"/>
  <path d="M132 790 C160 774 178 782 204 762" class="route"/>
  <text x="124" y="830" class="strong">独处慢走</text>
  <rect x="112" y="902" width="234" height="38" rx="19" fill="#fffaf2" stroke="#eadbcc" stroke-width="2"/>
  <text x="130" y="926" class="strong">自己说一句</text>
  <text x="282" y="926" fill="#b76267" font-size="14" font-family="sans-serif" font-weight="700">发送</text>

  <!-- Phone 2 -->
  <text x="465" y="340" class="kicker">02 PROMPT / ONE SENTENCE</text>
  <rect x="465" y="365" width="310" height="610" rx="48" class="phone" filter="url(#shadow)"/>
  <rect x="483" y="383" width="274" height="574" rx="34" class="screen"/>
  <rect x="507" y="425" width="226" height="140" rx="22" fill="#fffaf2" stroke="#eadbcc" stroke-width="2"/>
  <text x="530" y="466" class="h2">今晚想怎么玩？</text>
  <text x="530" y="505" class="body">两个人，100 内，少走路。</text>
  <rect x="530" y="525" width="72" height="26" rx="13" fill="#3b1b1f"/>
  <text x="547" y="543" fill="#fffaf2" font-size="12" font-family="sans-serif">发送</text>
  <text x="507" y="610" class="label">生成 3 张候选卡，不直接跳结果</text>
  <g opacity="0.42">
    <rect x="507" y="650" width="100" height="138" rx="14" class="card"/>
    <rect x="622" y="650" width="100" height="138" rx="14" class="card"/>
    <rect x="507" y="805" width="216" height="76" rx="14" class="card"/>
  </g>

  <!-- Phone 3 -->
  <text x="860" y="340" class="kicker">03 REVEAL / PAPER ROUTE</text>
  <rect x="860" y="365" width="310" height="610" rx="48" class="phone" filter="url(#shadow)"/>
  <rect x="878" y="383" width="274" height="574" rx="34" class="screen"/>
  <text x="908" y="432" class="strong">听懂今天</text>
  <rect x="908" y="458" width="214" height="72" rx="20" fill="#fffaf2" stroke="#eadbcc" stroke-width="2"/>
  <text x="932" y="500" class="body">上海 / 约会 / 少走路</text>
  <text x="908" y="585" class="strong">筛同城站点</text>
  <circle cx="944" cy="650" r="10" fill="#b76267"/>
  <circle cx="1010" cy="616" r="10" fill="#6b7a66"/>
  <circle cx="1090" cy="670" r="10" fill="#d9a37b"/>
  <path d="M944 650 C972 610 1014 606 1090 670" class="line"/>
  <text x="908" y="745" class="strong">剪成路线</text>
  <rect x="908" y="774" width="214" height="86" rx="18" fill="#fffaf2" stroke="#eadbcc" stroke-width="2"/>
  <text x="932" y="826" class="h2">下班心动线</text>

  <!-- Phone 4 -->
  <text x="1255" y="340" class="kicker">04 RESULT / LIVE ROUTE FIRST</text>
  <rect x="1255" y="365" width="310" height="610" rx="48" class="phone" filter="url(#shadow)"/>
  <rect x="1273" y="383" width="274" height="574" rx="34" class="screen"/>
  <text x="1304" y="432" class="h2">下班心动线</text>
  <text x="1304" y="462" class="label">上海 · 90m</text>
  <rect x="1304" y="502" width="214" height="136" rx="18" fill="#fffaf2" stroke="#eadbcc" stroke-width="2"/>
  <text x="1326" y="534" class="kicker">MAP ROUTE</text>
  <path d="M1334 596 C1370 546 1434 620 1492 560" class="line"/>
  <circle cx="1334" cy="596" r="10" fill="#b76267"/>
  <circle cx="1418" cy="600" r="10" fill="#6b7a66"/>
  <circle cx="1492" cy="560" r="10" fill="#d9a37b"/>
  <rect x="1304" y="672" width="214" height="90" rx="18" class="card"/>
  <text x="1326" y="710" class="label">当前站 01</text>
  <text x="1326" y="742" class="strong">武康路街角</text>
  <rect x="1426" y="708" width="72" height="34" rx="17" class="primary"/>
  <text x="1450" y="730" fill="#fffaf2" font-size="13" font-family="sans-serif">导航</text>
  <rect x="1304" y="790" width="92" height="32" rx="16" fill="#3b1b1f"/>
  <text x="1324" y="811" fill="#fffaf2" font-size="13" font-family="sans-serif">更安静</text>
  <rect x="1406" y="790" width="92" height="32" rx="16" class="chip"/>
  <text x="1426" y="811" class="label">更便宜</text>

  <!-- Flow -->
  <text x="70" y="1040" class="kicker">INTERACTION FLOW</text>
  <rect x="70" y="1060" width="260" height="42" rx="12" class="card"/>
  <text x="96" y="1087" class="strong">1. 刷卡</text>
  <text x="360" y="1087" class="muted">→</text>
  <rect x="410" y="1060" width="260" height="42" rx="12" class="card"/>
  <text x="436" y="1087" class="strong">2. 点卡</text>
  <text x="700" y="1087" class="muted">→</text>
  <rect x="750" y="1060" width="260" height="42" rx="12" class="card"/>
  <text x="776" y="1087" class="strong">3. 显影</text>
  <text x="1040" y="1087" class="muted">→</text>
  <rect x="1090" y="1060" width="260" height="42" rx="12" class="card"/>
  <text x="1116" y="1087" class="strong">4. 当前站</text>
  <text x="1380" y="1087" class="muted">→</text>
  <rect x="1430" y="1060" width="300" height="42" rx="12" class="card"/>
  <text x="1456" y="1087" class="strong">5. 一句话再改</text>
</svg>
