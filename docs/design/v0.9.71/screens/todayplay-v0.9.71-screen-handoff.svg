    <g transform="translate(44 142)">
      <path d="M22 0 H278 C278 18 296 18 296 36 V266 C296 284 278 284 278 302 H22 C22 284 4 284 4 266 V36 C4 18 22 18 22 0Z" fill="#fffaf2" stroke="#d9cdbc" stroke-width="1.5"/>
