<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="1980" viewBox="0 0 1520 1980">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="9171"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.045"/></feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#2d221e" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7f0"/>
      <stop offset="1" stop-color="#eee3d5"/>
    </linearGradient>
    <linearGradient id="dusk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d7bab2"/>
      <stop offset="0.55" stop-color="#8b7169"/>
      <stop offset="1" stop-color="#2f2d2a"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9d3ba"/>
      <stop offset="1" stop-color="#667260"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#efd9d6"/>
      <stop offset="1" stop-color="#a95658"/>
    </linearGradient>
    <style>
      .bg{fill:#f5efe6}.ink{fill:#2e2724}.muted{fill:#837a72}.accent{fill:#9f5556}.olive{fill:#626f5e}
      .phone{fill:#1f1c1b}.screen{fill:url(#paper)}.card{fill:#fffaf2;stroke:#ded0be;stroke-width:1.2}
      .chip{fill:#f2eadf;stroke:#d9cdbc;stroke-width:1}.button{fill:#9f5556}.black{fill:#2e2724}
      .line{stroke:#d9cdbc;stroke-width:1.5}.dash{stroke:#cdbfab;stroke-width:1.2;stroke-dasharray:5 6}
      .label{font-family:Arial,"Microsoft YaHei",sans-serif;font-size:13px;letter-spacing:2px}
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:24px;font-weight:700;letter-spacing:0}
      .body{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:18px;letter-spacing:0}
      .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:14px;letter-spacing:0}
      .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:12px;letter-spacing:0}
      .serif{font-family:"Times New Roman","Songti SC",serif;letter-spacing:0}
    </style>
  </defs>

  <rect width="1520" height="1980" class="bg"/>
  <rect width="1520" height="1980" fill="#fff" opacity="0.3" filter="url(#paperNoise)"/>
  <g transform="translate(56 44)">
    <text class="label muted">TODAYPLAY V0.9.71 SCREEN HANDOFF</text>
    <text y="58" class="serif ink" font-size="48">六屏交接稿：从刷卡到今日路线</text>
    <text y="94" class="body muted">这张图用于 Android 开发拆解。每个手机屏幕都是一个可实现状态，不再回到旧首页说明文。</text>
  </g>

  <g id="screen-home-default" transform="translate(60 160)">
    <text class="label accent">01 HOME DEFAULT</text>
    <rect y="34" width="390" height="844" rx="48" class="phone" filter="url(#shadow)"/>
    <rect x="14" y="50" width="362" height="812" rx="38" class="screen"/>
    <rect x="14" y="50" width="362" height="812" rx="38" fill="#fff" opacity="0.14" filter="url(#paperNoise)"/>
    <text x="42" y="104" class="body ink">TodayPlay · 上海</text>
    <text x="316" y="104" class="tiny muted">设置</text>
