      <circle cx="16" cy="104" r="13" fill="#626f5e"/><text x="12" y="109" class="tiny" fill="#fffaf2">2</text><text x="44" y="110" class="small ink">小店坐下聊</text>
      <circle cx="16" cy="160" r="13" fill="#d4a47b"/><text x="12" y="165" class="tiny" fill="#fffaf2">3</text><text x="44" y="166" class="small ink">外滩收尾照</text>
    </g>
    <rect x="44" y="790" width="142" height="40" rx="20" class="button"/><text x="95" y="816" class="small" fill="#fffaf2">开始</text>
    <rect x="202" y="790" width="74" height="40" rx="20" class="chip"/><text x="226" y="816" class="small muted">保存</text>
    <rect x="290" y="790" width="56" height="40" rx="20" class="chip"/><text x="304" y="816" class="small muted">邀约</text>
