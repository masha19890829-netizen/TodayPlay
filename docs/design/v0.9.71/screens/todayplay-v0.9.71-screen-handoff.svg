      <rect x="192" width="54" height="30" rx="15" class="chip"/><text x="206" y="21" class="tiny muted">独处</text>
      <rect y="40" width="54" height="30" rx="15" class="chip"/><text x="14" y="61" class="tiny muted">雨天</text>
      <rect x="64" y="40" width="66" height="30" rx="15" class="chip"/><text x="78" y="61" class="tiny muted">低预算</text>
      <rect x="140" y="40" width="66" height="30" rx="15" class="chip"/><text x="154" y="61" class="tiny muted">少走路</text>
    </g>
    <g transform="translate(42 236)">
      <rect width="138" height="218" rx="9" class="card"/>
      <rect x="11" y="11" width="116" height="88" rx="7" fill="url(#dusk)"/>
      <path d="M24 78 C48 54 74 82 112 54" fill="none" stroke="#fffaf2" stroke-width="2.3"/>
      <text x="13" y="130" class="small ink">黄昏散步</text><text x="13" y="156" class="tiny muted">上海 · 2h · 100内</text>
      <text x="13" y="181" class="tiny olive">3站 · 少走路</text>
      <rect x="156" width="138" height="172" rx="9" class="card"/>
      <rect x="167" y="11" width="116" height="62" rx="7" fill="url(#rose)"/>
      <path d="M184 58 L222 31 L266 62" fill="none" stroke="#fffaf2" stroke-width="2"/>
      <text x="169" y="104" class="small ink">电影打卡</text><text x="169" y="130" class="tiny muted">上海 · 90m</text>
      <text x="169" y="152" class="tiny olive">票根路线</text>
      <rect x="156" y="194" width="138" height="228" rx="9" class="card"/>
      <rect x="167" y="205" width="116" height="92" rx="7" fill="url(#olive)"/>
      <circle cx="196" cy="250" r="7" fill="#fffaf2" opacity="0.86"/><circle cx="254" cy="226" r="6" fill="#fffaf2" opacity="0.72"/>
      <path d="M196 250 C216 244 232 232 254 226" fill="none" stroke="#fffaf2" stroke-width="2" stroke-dasharray="4 5"/>
      <text x="169" y="330" class="small ink">雨天室内</text><text x="169" y="356" class="tiny muted">上海 · 2h</text>
      <text x="169" y="381" class="tiny olive">坐下聊天</text>
      <rect y="242" width="138" height="180" rx="9" class="card"/>
      <rect x="11" y="253" width="116" height="60" rx="7" fill="#d8cab7"/>
      <line x1="26" y1="284" x2="111" y2="284" stroke="#9f5556" stroke-width="2"/>
      <circle cx="40" cy="284" r="5" fill="#9f5556"/><circle cx="85" cy="284" r="5" fill="#626f5e"/>
      <text x="13" y="344" class="small ink">低预算聊</text><text x="13" y="370" class="tiny muted">100内 · 3站</text>
    </g>
    <rect x="116" y="814" width="158" height="36" rx="18" class="button"/><text x="165" y="838" class="tiny" fill="#fffaf2">自己说一句</text>
  </g>

  <g id="screen-home-filter" transform="translate(565 160)">
