<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1180" viewBox="0 0 1920 1180">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="711"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3b2a24" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="screenPaper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7f0"/>
      <stop offset="1" stop-color="#eee3d5"/>
    </linearGradient>
    <linearGradient id="dusk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d7bab2"/>
      <stop offset="0.55" stop-color="#8b7169"/>
      <stop offset="1" stop-color="#2f2d2a"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9d3ba"/>
      <stop offset="1" stop-color="#667260"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#efd9d6"/>
      <stop offset="1" stop-color="#a95658"/>
    </linearGradient>
    <style>
      .bg { fill:#f5efe6; }
      .ink { fill:#2e2724; }
      .muted { fill:#837a72; }
      .accent { fill:#9f5556; }
      .olive { fill:#626f5e; }
      .phone { fill:#1f1c1b; }
      .screen { fill:url(#screenPaper); }
      .card { fill:#fffaf2; stroke:#ded0be; stroke-width:1.1; }
      .chip { fill:#f2eadf; stroke:#d9cdbc; stroke-width:1; }
      .button { fill:#9f5556; }
      .line { stroke:#d9cdbc; stroke-width:1.4; }
      .title { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-size:46px; font-weight:700; letter-spacing:0; }
      .h2 { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-size:26px; font-weight:700; letter-spacing:0; }
      .body { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-size:18px; letter-spacing:0; }
      .small { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-size:14px; letter-spacing:0; }
      .tiny { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-size:11px; letter-spacing:0; }
      .label { font-family:Arial,"Microsoft YaHei",sans-serif; font-size:12px; letter-spacing:2px; }
    </style>
  </defs>

  <rect width="1920" height="1180" class="bg"/>
  <rect width="1920" height="1180" fill="#fff" opacity="0.32" filter="url(#paperNoise)"/>
  <g transform="translate(70 58)">
    <text class="label muted">TODAYPLAY V0.9.71 RESPONSIVE STATES</text>
    <text y="62" class="title ink">多设备设计稿：少字、可点、不卡布局</text>
    <text y="101" class="body muted">普通手机、小屏、折叠屏、横屏都以瀑布流路线卡为主路径；输入框只作为“自己说一句”的次入口。</text>
  </g>

