# Copy this file to release_config.properties for local release or CI builds.
# Do not commit release_config.properties.
#
# Rules:
# - BILLING_VERIFY_ENDPOINT must be a real HTTPS URL ending at your deployed /billing/verify endpoint.
# - TRAVEL_CONTENT_BASE_URL must be a real HTTPS base URL for the authorized travel-content backend.
# - PRIVACY_POLICY_URL must be the public HTTPS privacy policy URL used in Play Console.
# - SUPPORT_EMAIL must be a real support email shown to users and Play review.
# - GOOGLE_WEB_CLIENT_ID must be the Web OAuth 2.0 client ID used by Android Credential Manager Sign in with Google.
# - AUTH_VERIFY_ENDPOINT must be your HTTPS backend endpoint that verifies Google ID tokens before trusting accounts.
# - AI_ROUTE_GATEWAY_URL must be your deployed TodayPlay AI Route Gateway base URL. Leave empty to use local fallback routes.
# - Keep fields empty until the external service is deployed and reviewed.

BILLING_VERIFY_ENDPOINT=
TRAVEL_CONTENT_BASE_URL=
PRIVACY_POLICY_URL=
SUPPORT_EMAIL=
GOOGLE_WEB_CLIENT_ID=
AUTH_VERIFY_ENDPOINT=
AI_ROUTE_GATEWAY_URL=
